# nginx snippet for /etc/nginx/sites-enabled/vyv_sites.
# Insert this BEFORE the regex `location ~ ^/(?!api/)([a-z0-9_-]+)/?(.*)$` block.
# After editing:  nginx -t && systemctl reload nginx

location ^~ /leadlag-lab/ {
    proxy_pass http://127.0.0.1:8899/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /leadlag-lab;

    # Prevent the browser from serving /leadlag-lab/ out of its cache
    # when the upstream changes (otherwise old dashboard.html lingers).
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}
