# JupyterLab under /leadlag-lab/lab/ with WebSocket support.
# Include inside the same TLS server block that serves /leadlag-lab/.
# Insert BEFORE the generic /leadlag-lab/ proxy block.
#
# Prerequisites:
# - Jupyter started with: --ServerApp.base_url=/leadlag-lab/lab/
# - Jupyter bound to 127.0.0.1:8889

location ^~ /leadlag-lab/lab/ {
    proxy_pass http://127.0.0.1:8889;
    proxy_http_version 1.1;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /leadlag-lab/lab/;

    # WebSocket
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
